<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker - Artist Gallery</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>🎸 Groupie Tracker</h1>
        <p>Discover your favorite artists and their tour dates</p>
    </header>

    <main>
        <div class="artist-grid">
            {{range .}}
            <div class="artist-card">
                <img src="{{.Image}}" alt="{{.Name}}" class="artist-image">
                <div class="artist-info">
                    <h2>{{.Name}}</h2>
                    <p><strong>Formed:</strong> {{.CreationDate}}</p>
                    <p><strong>First Album:</strong> {{.FirstAlbum}}</p>
                    <p><strong>Members:</strong> {{len .Members}}</p>
                    <a href="/artist?id={{.ID}}" class="details-link">View Details →</a>
                </div>
            </div>
            {{end}}
        </div>
    </main>

    <footer>
        <p>© 2024 Groupie Tracker - Zone01 Kisumu</p>
    </footer>
</body>
</html>
